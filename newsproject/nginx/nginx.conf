# Nginx configuration for the newsproject.
#
# Responsibilities:
#   1. Serve /static/ files directly without touching Django (much faster).
#   2. Proxy all other requests to the Gunicorn application server.
#   3. Set standard security headers.

upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Raise client body size limit to allow image uploads up to 10 MB.
    client_max_body_size 10M;

    # --- Static files ---
    # Nginx serves these directly; Django/Gunicorn never sees these requests.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Application ---
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}
